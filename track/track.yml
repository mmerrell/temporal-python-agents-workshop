title: Building Durable AI Agents with Temporal
teaser: Build production-ready AI agents using Python and Temporal — fault-tolerant,
  observable, and ready for the real world.
description: |-
  A hands-on workshop for building durable AI agents with Temporal and the OpenAI Agents SDK.

  You'll start from first principles — implementing an agentic loop from scratch inside a Temporal workflow — then add capabilities progressively: integrating the OpenAI Agents SDK, enabling human-in-the-loop interaction, and orchestrating multiple specialized agents.

  **What you'll build:**
  - A durable agentic loop with tool calling, backed by Temporal
  - The same agent rebuilt with the OpenAI Agents SDK — with Temporal underneath
  - Human-in-the-loop interaction via Temporal signals
  - A multi-agent orchestration system

  **Prerequisites:** Basic Python familiarity. No prior Temporal experience required.
